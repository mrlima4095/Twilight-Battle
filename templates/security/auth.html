<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twilight Battle — Login</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    
    <style>

:root {
  --bg-0: #07060f;
  --bg-1: #0e0b1a;
  --bg-2: #16122a;
  --panel: rgba(18, 14, 36, 0.72);
  --panel-solid: #141026;
  --panel-2: rgba(28, 22, 52, 0.85);
  --border: rgba(255, 215, 120, 0.18);
  --border-strong: rgba(255, 215, 120, 0.42);
  --gold: #f0c14b;
  --gold-2: #ffb347;
  --gold-dim: rgba(240, 193, 75, 0.15);
  --cyan: #5ee7ff;
  --violet: #9b7bff;
  --magenta: #ff5ec8;
  --rose: #ff6b8a;
  --green: #3ddc97;
  --red: #ff4d6d;
  --text: #f4f0ff;
  --muted: #a39bb8;
  --shadow: 0 20px 60px rgba(0,0,0,.45);
  --radius: 18px;
  --radius-sm: 12px;
  --font-ui: "Outfit", system-ui, sans-serif;
  --font-display: "Cinzel", "Times New Roman", serif;
  --glow-gold: 0 0 30px rgba(240, 193, 75, .25);
  --glow-cyan: 0 0 24px rgba(94, 231, 255, .2);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { min-height: 100%; }
body {
  font-family: var(--font-ui);
  color: var(--text);
  background:
    radial-gradient(1200px 600px at 10% -10%, rgba(155,123,255,.28), transparent 55%),
    radial-gradient(900px 500px at 100% 0%, rgba(255,94,200,.14), transparent 50%),
    radial-gradient(800px 400px at 50% 100%, rgba(94,231,255,.08), transparent 50%),
    linear-gradient(160deg, var(--bg-0), var(--bg-1) 40%, #120b22);
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: "";
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image:
    radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,.5), transparent),
    radial-gradient(1px 1px at 70% 20%, rgba(255,255,255,.35), transparent),
    radial-gradient(1px 1px at 40% 80%, rgba(255,255,255,.3), transparent),
    radial-gradient(1.5px 1.5px at 85% 60%, rgba(240,193,75,.5), transparent),
    radial-gradient(1px 1px at 10% 70%, rgba(94,231,255,.4), transparent);
  opacity: .5;
}
@keyframes fade-up { from { opacity:0; transform: translateY(14px); } to { opacity:1; transform:none; } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pulse-glow { 0%,100% { box-shadow: 0 0 0 0 rgba(61,220,151,0); } 50% { box-shadow: 0 0 18px rgba(61,220,151,.25); } }

.swal2-popup {
  background: #16122a !important; color: var(--text) !important;
  border: 1px solid var(--border) !important; border-radius: 18px !important;
}

body {
  display: flex; align-items: center; justify-content: center;
  padding: 24px 16px;
}
.auth-shell { position: relative; z-index: 1; width: min(440px, 100%); animation: fade-up .55s ease; }
.auth-container {
  background: var(--panel); backdrop-filter: blur(18px);
  border: 1px solid var(--border); border-radius: 22px;
  padding: 32px 28px 24px; box-shadow: var(--shadow);
  position: relative; overflow: hidden;
}
.auth-container::before {
  content: ""; position: absolute; inset: 0 0 auto 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,215,120,.55), transparent);
}
.auth-container h1 {
  font-family: var(--font-display); text-align: center;
  font-size: 2rem; letter-spacing: .04em;
  background: linear-gradient(120deg, #fff6d0, var(--gold), var(--gold-2));
  -webkit-background-clip: text; background-clip: text; color: transparent;
  margin-bottom: 6px;
}
.subtitle { text-align: center; color: var(--muted); margin-bottom: 22px; font-weight: 300; }
.tab-buttons {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  padding: 5px; border-radius: 14px; background: rgba(0,0,0,.3);
  border: 1px solid rgba(255,255,255,.06); margin-bottom: 20px;
}
.tab-btn {
  border: none; border-radius: 10px; padding: 11px 12px; cursor: pointer;
  font-family: inherit; font-weight: 700; font-size: .92rem;
  background: transparent; color: var(--muted); transition: .2s;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active {
  background: linear-gradient(135deg, var(--gold), var(--gold-2));
  color: #1a1020; box-shadow: 0 6px 18px rgba(240,193,75,.28);
}
.form-group { margin-bottom: 14px; }
.form-group label {
  display: block; color: var(--muted); font-size: .78rem; font-weight: 600;
  letter-spacing: .05em; text-transform: uppercase; margin-bottom: 6px;
}
.form-group input {
  width: 100%; padding: 13px 14px; border-radius: 12px;
  border: 1px solid rgba(255,255,255,.1); background: rgba(0,0,0,.35);
  color: var(--text); font-family: inherit; font-size: 1rem; outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.form-group input:focus {
  border-color: rgba(240,193,75,.55); box-shadow: 0 0 0 3px rgba(240,193,75,.12);
}
.form-group input::placeholder { color: #6b6480; }
.error-message {
  min-height: 18px; color: #ff8fa3; font-size: .85rem; margin: 4px 0 10px;
  font-weight: 600;
}
.auth-btn {
  width: 100%; padding: 14px; border: none; border-radius: 12px;
  font-family: inherit; font-size: 1rem; font-weight: 800; cursor: pointer;
  background: linear-gradient(135deg, var(--gold), var(--gold-2));
  color: #1a1020; box-shadow: 0 8px 24px rgba(240,193,75,.28);
  transition: .15s; margin-top: 4px;
}
.auth-btn:hover { transform: translateY(-2px); filter: brightness(1.05); }
.info-text { text-align: center; color: var(--muted); font-size: .8rem; margin-top: 18px; opacity: .8; }
.auth-links { text-align: center; margin-top: 14px; }
.auth-links a { color: var(--gold); text-decoration: none; font-size: .9rem; }
.auth-links a:hover { text-decoration: underline; }
.loading {
  display: none; position: fixed; inset: 0; z-index: 2000;
  background: rgba(7,6,15,.72); backdrop-filter: blur(8px);
  align-items: center; justify-content: center; flex-direction: column; gap: 12px;
  color: var(--muted);
}
.loading.active { display: flex !important; }
.spinner {
  width: 44px; height: 44px; border-radius: 50%;
  border: 3px solid rgba(240,193,75,.15); border-top-color: var(--gold);
  animation: spin .8s linear infinite;
}
.hero-badge {
  display: block; text-align: center; margin-bottom: 10px;
  font-size: .72rem; letter-spacing: .14em; text-transform: uppercase; color: var(--gold);
}

    </style>
</head>
<body>

<div class="auth-shell">
  <div class="auth-container">
    <div class="hero-badge">✦ Reino do Crepúsculo</div>
    <h1>Twilight Battle</h1>
    <p class="subtitle">Faça login para continuar a jornada</p>

    <div class="tab-buttons">
      <button class="tab-btn active" id="login-tab" type="button">Login</button>
      <button class="tab-btn" id="register-tab" type="button">Registrar</button>
    </div>

    <div id="login-form">
      <div class="form-group">
        <label for="login-username">Usuário</label>
        <input type="text" id="login-username" placeholder="Digite seu usuário" autocomplete="username">
      </div>
      <div class="form-group">
        <label for="login-password">Senha</label>
        <input type="password" id="login-password" placeholder="Digite sua senha" autocomplete="current-password">
      </div>
      <div class="error-message" id="login-error"></div>
      <button class="auth-btn" id="login-btn" type="button">Entrar</button>
    </div>

    <div id="register-form" style="display:none">
      <div class="form-group">
        <label for="register-username">Usuário (minúsculas, 3–20 caracteres)</label>
        <input type="text" id="register-username" placeholder="ex: jogador123" autocomplete="off">
      </div>
      <div class="form-group">
        <label for="register-password">Senha (mínimo 4 caracteres)</label>
        <input type="password" id="register-password" placeholder="Digite sua senha" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label for="register-confirm">Confirmar senha</label>
        <input type="password" id="register-confirm" placeholder="Confirme sua senha" autocomplete="new-password">
      </div>
      <div class="error-message" id="register-error"></div>
      <button class="auth-btn" id="register-btn" type="button">Criar conta</button>
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Conectando...</p>
    </div>

    <p class="info-text">Seus dados são armazenados com segurança</p>
    <div class="auth-links">
      <a href="/rules">📜 Regras</a>
      · <a href="/help">❓ Ajuda</a>
    </div>
  </div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const loginTab = document.getElementById('login-tab');
            const registerTab = document.getElementById('register-tab');
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const loginBtn = document.getElementById('login-btn');
            const registerBtn = document.getElementById('register-btn');
            const loading = document.getElementById('loading');
            const loginError = document.getElementById('login-error');
            const registerError = document.getElementById('register-error');
            
            // Alternar entre tabs
            loginTab.addEventListener('click', function() {
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                loginError.style.display = 'none';
                registerError.style.display = 'none';
            });
            
            registerTab.addEventListener('click', function() {
                registerTab.classList.add('active');
                loginTab.classList.remove('active');
                registerForm.style.display = 'block';
                loginForm.style.display = 'none';
                loginError.style.display = 'none';
                registerError.style.display = 'none';
            });
            
            // Login
            loginBtn.addEventListener('click', function() {
                const username = document.getElementById('login-username').value.trim().toLowerCase();
                const password = document.getElementById('login-password').value;
                
                if (!username || !password) {
                    loginError.textContent = 'Preencha todos os campos';
                    loginError.style.display = 'block';
                    return;
                }
                
                loading.classList.add('active');
                loginError.style.display = 'none';
                
                fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                })
                .then(response => response.json())
                .then(data => {
                    loading.classList.remove('active');
                    
                    if (data.success) {
                        if (data.current_game) {
                            window.location.href = `/game/${data.current_game}`;
                        } else {
                            window.location.href = '/';
                        }
                    } else {
                        loginError.textContent = data.message;
                        loginError.style.display = 'block';
                    }
                })
                .catch(error => {
                    loading.classList.remove('active');
                    loginError.textContent = 'Erro ao conectar ao servidor';
                    loginError.style.display = 'block';
                });
            });
            
            // Registro
            registerBtn.addEventListener('click', function() {
                const username = document.getElementById('register-username').value.trim().toLowerCase();
                const password = document.getElementById('register-password').value;
                const confirm = document.getElementById('register-confirm').value;
                
                if (!username || !password || !confirm) {
                    registerError.textContent = 'Preencha todos os campos';
                    registerError.style.display = 'block';
                    return;
                }
                
                if (password !== confirm) {
                    registerError.textContent = 'As senhas não coincidem';
                    registerError.style.display = 'block';
                    return;
                }
                
                if (username.length < 3 || username.length > 20) {
                    registerError.textContent = 'Usuário deve ter entre 3 e 20 caracteres';
                    registerError.style.display = 'block';
                    return;
                }
                
                if (password.length < 4) {
                    registerError.textContent = 'Senha deve ter pelo menos 4 caracteres';
                    registerError.style.display = 'block';
                    return;
                }
                
                loading.classList.add('active');
                registerError.style.display = 'none';
                
                fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                })
                .then(response => response.json())
                .then(data => {
                    loading.classList.remove('active');
                    
                    if (data.success) {
                        window.location.href = '/';
                    } else {
                        registerError.textContent = data.message;
                        registerError.style.display = 'block';
                    }
                })
                .catch(error => {
                    loading.classList.remove('active');
                    registerError.textContent = 'Erro ao conectar ao servidor';
                    registerError.style.display = 'block';
                });
            });
            
            // Enter key
            document.getElementById('login-password').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') loginBtn.click();
            });
            
            document.getElementById('register-confirm').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') registerBtn.click();
            });
        });
    </script>
</body>
</html>
