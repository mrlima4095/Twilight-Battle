<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twilight Battle — Jornal da Aurora</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>

:root {
  --bg-0: #07060f;
  --bg-1: #0e0b1a;
  --bg-2: #16122a;
  --panel: rgba(18, 14, 36, 0.72);
  --panel-solid: #141026;
  --panel-2: rgba(28, 22, 52, 0.85);
  --border: rgba(255, 215, 120, 0.18);
  --border-strong: rgba(255, 215, 120, 0.42);
  --gold: #f0c14b;
  --gold-2: #ffb347;
  --gold-dim: rgba(240, 193, 75, 0.15);
  --cyan: #5ee7ff;
  --violet: #9b7bff;
  --magenta: #ff5ec8;
  --rose: #ff6b8a;
  --green: #3ddc97;
  --red: #ff4d6d;
  --text: #f4f0ff;
  --muted: #a39bb8;
  --shadow: 0 20px 60px rgba(0,0,0,.45);
  --radius: 18px;
  --radius-sm: 12px;
  --font-ui: "Outfit", system-ui, sans-serif;
  --font-display: "Cinzel", "Times New Roman", serif;
  --glow-gold: 0 0 30px rgba(240, 193, 75, .25);
  --glow-cyan: 0 0 24px rgba(94, 231, 255, .2);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { min-height: 100%; }
body {
  font-family: var(--font-ui);
  color: var(--text);
  background:
    radial-gradient(1200px 600px at 10% -10%, rgba(155,123,255,.28), transparent 55%),
    radial-gradient(900px 500px at 100% 0%, rgba(255,94,200,.14), transparent 50%),
    radial-gradient(800px 400px at 50% 100%, rgba(94,231,255,.08), transparent 50%),
    linear-gradient(160deg, var(--bg-0), var(--bg-1) 40%, #120b22);
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: "";
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image:
    radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,.5), transparent),
    radial-gradient(1px 1px at 70% 20%, rgba(255,255,255,.35), transparent),
    radial-gradient(1px 1px at 40% 80%, rgba(255,255,255,.3), transparent),
    radial-gradient(1.5px 1.5px at 85% 60%, rgba(240,193,75,.5), transparent),
    radial-gradient(1px 1px at 10% 70%, rgba(94,231,255,.4), transparent);
  opacity: .5;
}
@keyframes fade-up { from { opacity:0; transform: translateY(14px); } to { opacity:1; transform:none; } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pulse-glow { 0%,100% { box-shadow: 0 0 0 0 rgba(61,220,151,0); } 50% { box-shadow: 0 0 18px rgba(61,220,151,.25); } }

.swal2-popup {
  background: #16122a !important; color: var(--text) !important;
  border: 1px solid var(--border) !important; border-radius: 18px !important;
}

body { padding: 0; }
.journal-container {
  position: relative; z-index: 1;
  max-width: 1100px; margin: 0 auto;
  padding: 18px 16px 60px; animation: fade-up .45s ease;
}
.game-header {
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
  padding: 16px 18px; margin-bottom: 16px;
  background: var(--panel); backdrop-filter: blur(16px);
  border: 1px solid var(--border); border-radius: 18px; box-shadow: var(--shadow);
}
.game-title {
  font-family: var(--font-display); font-size: 1.35rem; font-weight: 700;
  color: var(--gold); display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.game-title a {
  font-family: var(--font-ui); font-size: .78rem !important; margin-left: 0 !important;
  color: var(--muted) !important; text-decoration: none !important;
  padding: 5px 10px; border-radius: 999px; border: 1px solid rgba(255,255,255,.1);
}
.game-title a:hover { color: var(--gold) !important; border-color: var(--border); }
.game-info { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.user-badge {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 12px 6px 6px; border-radius: 999px;
  background: rgba(0,0,0,.3); border: 1px solid rgba(255,255,255,.08);
}
.user-avatar {
  width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, var(--gold), var(--gold-2));
  color: #1a1020; font-weight: 800; font-size: .95rem;
}
.logout-btn {
  padding: 9px 14px; border: none; border-radius: 11px; cursor: pointer;
  font-family: inherit; font-weight: 700; font-size: .85rem;
  background: rgba(255,77,109,.15); color: #ff8fa3; border: 1px solid rgba(255,77,109,.35);
  transition: .2s;
}
.logout-btn:hover { background: rgba(255,77,109,.28); color: #fff; }

.action-bar {
  display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px;
}
.action-btn {
  padding: 11px 16px; border: none; border-radius: 12px; cursor: pointer;
  font-family: inherit; font-weight: 700; font-size: .9rem;
  background: linear-gradient(135deg, var(--gold), var(--gold-2));
  color: #1a1020; box-shadow: 0 6px 18px rgba(240,193,75,.22); transition: .15s;
}
.action-btn:hover { transform: translateY(-1px); filter: brightness(1.05); }
.action-btn.secondary {
  background: rgba(155,123,255,.15); color: #d4c8ff;
  border: 1px solid rgba(155,123,255,.3); box-shadow: none;
}

.stats-row {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-card {
  padding: 16px; border-radius: 16px; text-align: center;
  background: var(--panel-2); border: 1px solid rgba(255,255,255,.06);
  transition: border-color .2s;
}
.stat-card:hover { border-color: var(--border); }
.stat-icon { font-size: 1.3rem; color: var(--gold); margin-bottom: 6px; }
.stat-number {
  font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; color: var(--text);
}
.stat-label { color: var(--muted); font-size: .78rem; margin-top: 4px; letter-spacing: .04em; text-transform: uppercase; }

.chronicle { display: flex; flex-direction: column; gap: 14px; }
.empty-chronicle {
  text-align: center; padding: 48px 20px; border-radius: 18px;
  background: var(--panel); border: 1px dashed rgba(240,193,75,.3); color: var(--muted);
}
.empty-chronicle i { font-size: 2.4rem; color: var(--gold); opacity: .7; }

.chronicle-entry {
  padding: 20px; border-radius: 18px;
  background: var(--panel); border: 1px solid rgba(255,255,255,.06);
  box-shadow: 0 12px 36px rgba(0,0,0,.25);
  border-left: 3px solid rgba(240,193,75,.5);
  transition: border-color .2s, transform .15s;
}
.chronicle-entry:hover { border-color: var(--border); transform: translateX(2px); }
.entry-header {
  display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;
  margin-bottom: 10px;
}
.version-tag {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 12px; border-radius: 999px; font-weight: 700; font-size: .85rem;
  background: var(--gold-dim); color: var(--gold); border: 1px solid var(--border);
}
.entry-date { color: var(--muted); font-size: .85rem; }
.entry-title {
  font-family: var(--font-display); font-size: 1.25rem; color: var(--text); margin-bottom: 8px;
}
.entry-desc { color: var(--muted); line-height: 1.6; margin-bottom: 14px; }

.features-tome { display: grid; gap: 10px; margin: 12px 0; }
.feature-arcane {
  display: flex; gap: 12px; padding: 12px; border-radius: 12px;
  background: rgba(155,123,255,.08); border: 1px solid rgba(155,123,255,.18);
}
.feature-icon {
  width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(240,193,75,.12); color: var(--gold);
}
.feature-text h4 { color: var(--gold); margin-bottom: 4px; font-size: .95rem; }
.feature-text p { color: var(--muted); font-size: .88rem; margin: 0; line-height: 1.45; }

.fix-list { list-style: none; margin: 10px 0; display: flex; flex-direction: column; gap: 6px; }
.fix-list li {
  padding: 8px 12px; border-radius: 10px; font-size: .9rem; color: #d8d0eb;
  background: rgba(0,0,0,.22); border: 1px solid rgba(255,255,255,.05);
}
.fix-list li i { color: var(--green); margin-right: 8px; }
.fix-list li .fa-bug { color: var(--rose); }

.badge-group { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
.badge {
  padding: 4px 10px; border-radius: 999px; font-size: .75rem; font-weight: 700;
  background: rgba(255,255,255,.06); color: var(--muted); border: 1px solid rgba(255,255,255,.08);
}
.badge-major {
  background: rgba(240,193,75,.15); color: var(--gold); border-color: rgba(240,193,75,.35);
}

.admin-actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
.small-btn {
  padding: 8px 12px; border: none; border-radius: 10px; cursor: pointer;
  font-family: inherit; font-weight: 700; font-size: .8rem;
  background: rgba(91,140,255,.2); color: #a8c4ff; border: 1px solid rgba(91,140,255,.35);
}
.small-btn:hover { background: rgba(91,140,255,.35); color: #fff; }
.small-btn.danger {
  background: rgba(255,77,109,.15); color: #ff8fa3; border-color: rgba(255,77,109,.35);
}
.small-btn.danger:hover { background: rgba(255,77,109,.3); color: #fff; }

/* modal form pieces used in SweetAlert HTML */
.tw-form { text-align: left; }
.tw-field { margin-bottom: 12px; }
.tw-field label {
  display: block; color: var(--muted); font-size: .78rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: .04em; margin-bottom: 5px;
}
.tw-field input, .tw-field select, .tw-field textarea {
  width: 100%; padding: 10px 12px; border-radius: 10px;
  border: 1px solid rgba(255,255,255,.12); background: rgba(0,0,0,.35);
  color: var(--text); font-family: inherit; font-size: .95rem;
}
.dynamic-row {
  display: grid; grid-template-columns: 1fr 1fr auto auto; gap: 6px; margin-bottom: 8px; align-items: center;
}
.dynamic-row input {
  padding: 8px 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,.12);
  background: rgba(0,0,0,.35); color: var(--text); font-family: inherit;
}
.remove-row {
  padding: 6px 8px; border: none; border-radius: 8px; cursor: pointer;
  background: rgba(255,77,109,.2); color: #ff8fa3;
}
.add-btn {
  margin-top: 6px; padding: 8px 12px; border: none; border-radius: 8px; cursor: pointer;
  background: rgba(61,220,151,.15); color: var(--green); font-weight: 700; font-family: inherit;
}
@media (max-width: 640px) {
  .dynamic-row { grid-template-columns: 1fr; }
  .game-title { font-size: 1.1rem; }
}

    </style>
</head>
<body>

<div class="journal-container">
  <div class="game-header">
    <div class="game-title">
      <i class="fas fa-scroll"></i>
      <span>Jornal da Aurora</span>
      <a href="/">⚔️ Voltar à Batalha</a>
    </div>
    <div class="game-info">
      <div class="user-badge" id="userBadge">
        <div class="user-avatar" id="userAvatar">T</div>
        <span id="userName">Carregando...</span>
      </div>
      <button class="logout-btn" id="logoutBtn" type="button">
        <i class="fas fa-door-open"></i> Sair
      </button>
    </div>
  </div>

  <div class="action-bar" id="adminBar" style="display:none">
    <button class="action-btn" id="newChronicleBtn" type="button">
      <i class="fas fa-quill"></i> Nova Atualização
    </button>
    <button class="action-btn secondary" id="refreshBtn" type="button">
      <i class="fas fa-sync-alt"></i> Atualizar
    </button>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-icon"><i class="fas fa-code-branch"></i></div>
      <div class="stat-number" id="statVersions">0</div>
      <div class="stat-label">Versões</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"><i class="fas fa-gem"></i></div>
      <div class="stat-number" id="statFeatures">0</div>
      <div class="stat-label">Novos Encantos</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"><i class="fas fa-hammer"></i></div>
      <div class="stat-number" id="statImprovements">0</div>
      <div class="stat-label">Melhorias</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"><i class="fas fa-hourglass-half"></i></div>
      <div class="stat-number" id="statLatest">-</div>
      <div class="stat-label">Último Pergaminho</div>
    </div>
  </div>

  <div id="chronicleContainer" class="chronicle"></div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
    let currentUser = null;
    let isAdmin = false;
    let entries = [];

    const formatDate = (iso) => {
        let d = new Date(iso);
        return d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });
    };

    const escapeHtml = (text) => {
        if (!text) return '';
        return text.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    };

    async function loadEntries() {
        try {
            const res = await fetch('/api/journal/entries');
            const data = await res.json();
            if (data.success) {
                entries = data.entries || [];
                renderChronicle();
                updateStats();
            } else {
                showError('Falha ao carregar as crônicas');
            }
        } catch(e) {
            console.error(e);
            showError('Erro de conexão com o arquivo-mestre');
        }
    }

    async function checkAuth() {
        try {
            const res = await fetch('/api/auth/status');
            const data = await res.json();
            if (!data.logged_in) {
                window.location.href = '/';
                return;
            }
            currentUser = data.user;
            isAdmin = currentUser?.level >= 4;
            
            const displayName = currentUser.realname || currentUser.username;
            document.getElementById('userName').innerText = displayName;
            document.getElementById('userAvatar').innerText = (displayName[0] || 'T').toUpperCase();
            
            if (isAdmin) {
                document.getElementById('adminBar').style.display = 'flex';
            }
            
            await loadEntries();
        } catch(e) {
            window.location.href = '/';
        }
    }

    async function saveNewEntry(payload) {
        const res = await fetch('/api/journal/create', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        return await res.json();
    }

    async function updateEntryById(id, payload) {
        const res = await fetch(`/api/journal/update/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        return await res.json();
    }

    async function deleteEntryById(id) {
        const confirm = await Swal.fire({
            title: '⚔️ Excluir registro?',
            text: 'Este pergaminho será perdido para sempre.',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#c73d3d',
            cancelButtonColor: '#3085d6',
            confirmButtonText: 'Sim, excluir',
            cancelButtonText: 'Cancelar',
            background: '#1a1a2e',
            color: '#fff'
        });
        if (!confirm.isConfirmed) return;
        
        const res = await fetch(`/api/journal/delete/${id}`, { method: 'DELETE' });
        const data = await res.json();
        if (data.success) {
            Swal.fire({ icon: 'success', title: 'Apagado!', toast: true, timer: 1500, showConfirmButton: false });
            loadEntries();
        } else {
            showError('Não foi possível deletar');
        }
    }

    function updateStats() {
        let totalVersions = entries.length;
        let totalFeatures = 0;
        let totalImprovements = 0;
        
        entries.forEach(e => {
            totalFeatures += (e.features?.length || 0);
            totalImprovements += (e.improvements?.length || 0) + (e.bugfixes?.length || 0);
        });
        
        document.getElementById('statVersions').innerText = totalVersions;
        document.getElementById('statFeatures').innerText = totalFeatures;
        document.getElementById('statImprovements').innerText = totalImprovements;
        document.getElementById('statLatest').innerText = entries.length ? entries[0].version : '-';
    }

    function renderChronicle() {
        const container = document.getElementById('chronicleContainer');
        if (!entries.length) {
            container.innerHTML = `
                <div class="empty-chronicle">
                    <i class="fas fa-scroll"></i>
                    <p style="margin-top: 20px;">O grimório de atualizações ainda está em branco.</p>
                    ${isAdmin ? '<p style="margin-top:8px;">Toque em "Nova Atualização" para escrever o primeiro capítulo.</p>' : ''}
                </div>
            `;
            return;
        }
        
        container.innerHTML = entries.map(entry => {
            const featuresHtml = entry.features?.length ? `
                <div class="features-tome">
                    ${entry.features.map(f => `
                        <div class="feature-arcane">
                            <div class="feature-icon"><i class="${f.icon || 'fas fa-star'}"></i></div>
                            <div class="feature-text">
                                <h4>${escapeHtml(f.title)}</h4>
                                <p>${escapeHtml(f.description)}</p>
                            </div>
                        </div>
                    `).join('')}
                </div>
            ` : '';
            
            const improvementsHtml = entry.improvements?.length ? `
                <ul class="fix-list">
                    ${entry.improvements.map(imp => `<li><i class="fas fa-check-circle"></i> ${escapeHtml(imp)}</li>`).join('')}
                </ul>
            ` : '';
            
            const bugfixesHtml = entry.bugfixes?.length ? `
                <ul class="fix-list">
                    ${entry.bugfixes.map(fix => `<li><i class="fas fa-bug"></i> ${escapeHtml(fix)}</li>`).join('')}
                </ul>
            ` : '';
            
            let typeBadge = '';
            if (entry.type === 'major') typeBadge = '<span class="badge badge-major">⚡ Major Release</span>';
            else if (entry.type === 'minor') typeBadge = '<span class="badge">📦 Minor Update</span>';
            else typeBadge = '<span class="badge">🔧 Patch</span>';
            
            const tagsHtml = entry.tags?.length ? `
                <div class="badge-group">
                    ${entry.tags.map(t => `<span class="badge">#${escapeHtml(t)}</span>`).join('')}
                    ${typeBadge}
                </div>
            ` : `<div class="badge-group">${typeBadge}</div>`;
            
            const adminBtns = isAdmin ? `
                <div class="admin-actions">
                    <button class="small-btn" data-edit="${entry.id}"><i class="fas fa-pen-fancy"></i> Editar</button>
                    <button class="small-btn danger" data-delete="${entry.id}"><i class="fas fa-trash-alt"></i> Excluir</button>
                </div>
            ` : '';
            
            return `
                <div class="chronicle-entry" data-entry-id="${entry.id}">
                    <div class="entry-header">
                        <div class="version-tag"><i class="fas fa-tag"></i> ${escapeHtml(entry.version)}</div>
                        <div class="entry-date"><i class="far fa-calendar-alt"></i> ${formatDate(entry.date)}</div>
                    </div>
                    <div class="entry-title">${escapeHtml(entry.title)}</div>
                    <div class="entry-desc">${escapeHtml(entry.description || 'Sem descrição adicional.')}</div>
                    ${featuresHtml}
                    ${improvementsHtml}
                    ${bugfixesHtml}
                    ${tagsHtml}
                    ${adminBtns}
                </div>
            `;
        }).join('');
        
        if (isAdmin) {
            document.querySelectorAll('[data-edit]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = btn.getAttribute('data-edit');
                    openEditDialog(id);
                });
            });
            document.querySelectorAll('[data-delete]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = btn.getAttribute('data-delete');
                    deleteEntryById(id);
                });
            });
        }
    }

    // ==================== MODAL CORRIGIDA (preserva dados) ====================
    let currentModalData = {
        features: [],
        improvements: [],
        bugfixes: [],
        tags: []
    };

    function renderFeatureRow(f, idx) {
        return `
            <div class="dynamic-row" data-feat-idx="${idx}">
                <input type="text" class="feat-title" placeholder="Título" value="${escapeHtml(f.title || '')}">
                <input type="text" class="feat-desc" placeholder="Descrição" value="${escapeHtml(f.description || '')}">
                <input type="text" class="feat-icon" placeholder="Ícone (fa-*)" value="${escapeHtml(f.icon || 'fas fa-star')}">
                <button class="remove-row remove-feat" data-idx="${idx}">🗑️</button>
            </div>
        `;
    }

    function renderImprovementRow(imp, idx) {
        return `
            <div class="dynamic-row" data-imp-idx="${idx}">
                <input type="text" class="imp-text" placeholder="Melhoria..." value="${escapeHtml(imp)}">
                <button class="remove-row remove-imp" data-idx="${idx}">🗑️</button>
            </div>
        `;
    }

    function renderBugfixRow(bug, idx) {
        return `
            <div class="dynamic-row" data-bug-idx="${idx}">
                <input type="text" class="bug-text" placeholder="Correção..." value="${escapeHtml(bug)}">
                <button class="remove-row remove-bug" data-idx="${idx}">🗑️</button>
            </div>
        `;
    }

    function renderTagRow(tag, idx) {
        return `
            <div class="dynamic-row" data-tag-idx="${idx}">
                <input type="text" class="tag-text" placeholder="tag" value="${escapeHtml(tag)}">
                <button class="remove-row remove-tag" data-idx="${idx}">🗑️</button>
            </div>
        `;
    }

    function refreshModalDisplays() {
        const featuresContainer = document.getElementById('featuresContainer');
        const improvementsContainer = document.getElementById('improvementsContainer');
        const bugfixesContainer = document.getElementById('bugfixesContainer');
        const tagsContainer = document.getElementById('tagsContainer');
        
        if (featuresContainer) {
            featuresContainer.innerHTML = currentModalData.features.map((f, idx) => renderFeatureRow(f, idx)).join('');
            featuresContainer.querySelectorAll('.remove-feat').forEach(btn => {
                btn.addEventListener('click', () => {
                    const idx = parseInt(btn.getAttribute('data-idx'));
                    currentModalData.features.splice(idx, 1);
                    refreshModalDisplays();
                });
            });
            featuresContainer.querySelectorAll('.feat-title, .feat-desc, .feat-icon').forEach((input, i) => {
                const rowIdx = Math.floor(i / 3);
                input.addEventListener('input', (e) => {
                    const field = e.target.classList.contains('feat-title') ? 'title' : 
                                   (e.target.classList.contains('feat-desc') ? 'description' : 'icon');
                    if (currentModalData.features[rowIdx]) {
                        currentModalData.features[rowIdx][field] = e.target.value;
                    }
                });
            });
        }
        
        if (improvementsContainer) {
            improvementsContainer.innerHTML = currentModalData.improvements.map((imp, idx) => renderImprovementRow(imp, idx)).join('');
            improvementsContainer.querySelectorAll('.remove-imp').forEach(btn => {
                btn.addEventListener('click', () => {
                    const idx = parseInt(btn.getAttribute('data-idx'));
                    currentModalData.improvements.splice(idx, 1);
                    refreshModalDisplays();
                });
            });
            improvementsContainer.querySelectorAll('.imp-text').forEach((input, idx) => {
                input.addEventListener('input', (e) => {
                    if (currentModalData.improvements[idx] !== undefined) {
                        currentModalData.improvements[idx] = e.target.value;
                    }
                });
            });
        }
        
        if (bugfixesContainer) {
            bugfixesContainer.innerHTML = currentModalData.bugfixes.map((bug, idx) => renderBugfixRow(bug, idx)).join('');
            bugfixesContainer.querySelectorAll('.remove-bug').forEach(btn => {
                btn.addEventListener('click', () => {
                    const idx = parseInt(btn.getAttribute('data-idx'));
                    currentModalData.bugfixes.splice(idx, 1);
                    refreshModalDisplays();
                });
            });
            bugfixesContainer.querySelectorAll('.bug-text').forEach((input, idx) => {
                input.addEventListener('input', (e) => {
                    if (currentModalData.bugfixes[idx] !== undefined) {
                        currentModalData.bugfixes[idx] = e.target.value;
                    }
                });
            });
        }
        
        if (tagsContainer) {
            tagsContainer.innerHTML = currentModalData.tags.map((tag, idx) => renderTagRow(tag, idx)).join('');
            tagsContainer.querySelectorAll('.remove-tag').forEach(btn => {
                btn.addEventListener('click', () => {
                    const idx = parseInt(btn.getAttribute('data-idx'));
                    currentModalData.tags.splice(idx, 1);
                    refreshModalDisplays();
                });
            });
            tagsContainer.querySelectorAll('.tag-text').forEach((input, idx) => {
                input.addEventListener('input', (e) => {
                    if (currentModalData.tags[idx] !== undefined) {
                        currentModalData.tags[idx] = e.target.value;
                    }
                });
            });
        }
    }

    function getModalFormData() {
        return {
            version: document.getElementById('modalVersion')?.value.trim() || '',
            title: document.getElementById('modalTitle')?.value.trim() || '',
            type: document.getElementById('modalType')?.value || 'minor',
            description: document.getElementById('modalDesc')?.value.trim() || '',
            features: currentModalData.features.filter(f => f.title && f.title.trim()),
            improvements: currentModalData.improvements.filter(i => i && i.trim()),
            bugfixes: currentModalData.bugfixes.filter(b => b && b.trim()),
            tags: currentModalData.tags.filter(t => t && t.trim())
        };
    }

    function resetModalData(entry = null) {
        if (entry) {
            currentModalData = {
                features: (entry.features || []).map(f => ({ 
                    title: f.title || '', 
                    description: f.description || '', 
                    icon: f.icon || 'fas fa-star' 
                })),
                improvements: [...(entry.improvements || [])],
                bugfixes: [...(entry.bugfixes || [])],
                tags: [...(entry.tags || [])]
            };
        } else {
            currentModalData = {
                features: [],
                improvements: [],
                bugfixes: [],
                tags: []
            };
        }
    }

    async function openNewModal() {
        resetModalData(null);
        
        const result = await Swal.fire({
            title: '🖋️ Escrever Nova Atualização',
            html: `
                <div class="tw-form">
                    <div class="tw-field">
                        <label>📜 VERSÃO</label>
                        <input id="modalVersion" placeholder="Ex: v1.4.0">
                    </div>
                    <div class="tw-field">
                        <label>🏷️ TÍTULO</label>
                        <input id="modalTitle" placeholder="O Despertar das Sombras">
                    </div>
                    <div class="tw-field">
                        <label>⚡ TIPO</label>
                        <select id="modalType">
                            <option value="minor">Minor Update</option>
                            <option value="major">Major Release</option>
                            <option value="patch">Patch</option>
                        </select>
                    </div>
                    <div class="tw-field">
                        <label>📖 DESCRIÇÃO GERAL</label>
                        <textarea id="modalDesc" rows="2" placeholder="O que esta atualização traz ao reino..."></textarea>
                    </div>
                    <div>
                        <label>✨ NOVAS HABILIDADES / FEATURES</label>
                        <div id="featuresContainer"></div>
                        <button type="button" id="addFeatureBtn" class="add-btn">+ Adicionar encantamento</button>
                    </div>
                    <div>
                        <label>🛠️ MELHORIAS</label>
                        <div id="improvementsContainer"></div>
                        <button type="button" id="addImprovementBtn" class="add-btn">+ Adicionar melhoria</button>
                    </div>
                    <div>
                        <label>🐛 CORREÇÕES</label>
                        <div id="bugfixesContainer"></div>
                        <button type="button" id="addBugfixBtn" class="add-btn">+ Corrigir fenda arcana</button>
                    </div>
                    <div>
                        <label>🏷️ MARCAS (TAGS)</label>
                        <div id="tagsContainer"></div>
                        <button type="button" id="addTagBtn" class="add-btn">+ Tag</button>
                    </div>
                </div>
            `,
            width: '850px',
            showCancelButton: true,
            confirmButtonText: 'Publicar Pergaminho',
            cancelButtonText: 'Cancelar',
            background: '#1a1a2e',
            color: '#fff',
            didOpen: () => {
                refreshModalDisplays();
                
                document.getElementById('addFeatureBtn')?.addEventListener('click', () => {
                    currentModalData.features.push({ title: '', description: '', icon: 'fas fa-star' });
                    refreshModalDisplays();
                });
                document.getElementById('addImprovementBtn')?.addEventListener('click', () => {
                    currentModalData.improvements.push('');
                    refreshModalDisplays();
                });
                document.getElementById('addBugfixBtn')?.addEventListener('click', () => {
                    currentModalData.bugfixes.push('');
                    refreshModalDisplays();
                });
                document.getElementById('addTagBtn')?.addEventListener('click', () => {
                    currentModalData.tags.push('');
                    refreshModalDisplays();
                });
            },
            preConfirm: async () => {
                const formData = getModalFormData();
                if (!formData.version || !formData.title) {
                    Swal.showValidationMessage('Versão e título são obrigatórios');
                    return false;
                }
                const res = await saveNewEntry(formData);
                if (!res.success) {
                    Swal.showValidationMessage(res.message || 'Erro arcano ao salvar');
                    return false;
                }
                return res;
            }
        });
        
        if (result.isConfirmed) {
            Swal.fire({ icon: 'success', title: 'Crônica atualizada!', toast: true, timer: 1500, showConfirmButton: false });
            loadEntries();
        }
    }

    async function openEditDialog(id) {
        const entry = entries.find(e => e.id === id);
        if (!entry) return;
        
        resetModalData(entry);
        
        const result = await Swal.fire({
            title: '✒️ Editar Pergaminho',
            html: `
                <div class="tw-form">
                    <div class="tw-field">
                        <label>📜 VERSÃO</label>
                        <input id="modalVersion" placeholder="Ex: v1.4.0" value="${escapeHtml(entry.version)}">
                    </div>
                    <div class="tw-field">
                        <label>🏷️ TÍTULO</label>
                        <input id="modalTitle" placeholder="O Despertar das Sombras" value="${escapeHtml(entry.title)}">
                    </div>
                    <div class="tw-field">
                        <label>⚡ TIPO</label>
                        <select id="modalType">
                            <option value="minor" ${entry.type === 'minor' ? 'selected' : ''}>Minor Update</option>
                            <option value="major" ${entry.type === 'major' ? 'selected' : ''}>Major Release</option>
                            <option value="patch" ${entry.type === 'patch' ? 'selected' : ''}>Patch</option>
                        </select>
                    </div>
                    <div class="tw-field">
                        <label>📖 DESCRIÇÃO GERAL</label>
                        <textarea id="modalDesc" rows="2">${escapeHtml(entry.description || '')}</textarea>
                    </div>
                    <div>
                        <label>✨ NOVAS HABILIDADES / FEATURES</label>
                        <div id="featuresContainer"></div>
                        <button type="button" id="addFeatureBtn" class="add-btn">+ Adicionar encantamento</button>
                    </div>
                    <div>
                        <label>🛠️ MELHORIAS</label>
                        <div id="improvementsContainer"></div>
                        <button type="button" id="addImprovementBtn" class="add-btn">+ Adicionar melhoria</button>
                    </div>
                    <div>
                        <label>🐛 CORREÇÕES</label>
                        <div id="bugfixesContainer"></div>
                        <button type="button" id="addBugfixBtn" class="add-btn">+ Corrigir fenda arcana</button>
                    </div>
                    <div>
                        <label>🏷️ MARCAS (TAGS)</label>
                        <div id="tagsContainer"></div>
                        <button type="button" id="addTagBtn" class="add-btn">+ Tag</button>
                    </div>
                </div>
            `,
            width: '850px',
            showCancelButton: true,
            confirmButtonText: 'Salvar Alterações',
            cancelButtonText: 'Cancelar',
            background: '#1a1a2e',
            color: '#fff',
            didOpen: () => {
                refreshModalDisplays();
                
                document.getElementById('addFeatureBtn')?.addEventListener('click', () => {
                    currentModalData.features.push({ title: '', description: '', icon: 'fas fa-star' });
                    refreshModalDisplays();
                });
                document.getElementById('addImprovementBtn')?.addEventListener('click', () => {
                    currentModalData.improvements.push('');
                    refreshModalDisplays();
                });
                document.getElementById('addBugfixBtn')?.addEventListener('click', () => {
                    currentModalData.bugfixes.push('');
                    refreshModalDisplays();
                });
                document.getElementById('addTagBtn')?.addEventListener('click', () => {
                    currentModalData.tags.push('');
                    refreshModalDisplays();
                });
            },
            preConfirm: async () => {
                const formData = getModalFormData();
                if (!formData.version || !formData.title) {
                    Swal.showValidationMessage('Versão e título são obrigatórios');
                    return false;
                }
                const res = await updateEntryById(id, formData);
                if (!res.success) {
                    Swal.showValidationMessage(res.message || 'Erro ao atualizar');
                    return false;
                }
                return res;
            }
        });
        
        if (result.isConfirmed) {
            Swal.fire({ icon: 'success', title: 'Atualizado!', toast: true, timer: 1500, showConfirmButton: false });
            loadEntries();
        }
    }

    function showError(msg) {
        Swal.fire({
            icon: 'error',
            title: 'Erro',
            text: msg,
            background: '#1a1a2e',
            color: '#fff',
            confirmButtonColor: '#ffd700'
        });
    }

    document.getElementById('logoutBtn')?.addEventListener('click', async () => {
        await fetch('/api/logout', { method: 'POST' });
        window.location.href = '/';
    });
    document.getElementById('newChronicleBtn')?.addEventListener('click', openNewModal);
    document.getElementById('refreshBtn')?.addEventListener('click', loadEntries);
    
    checkAuth();
</script>
</body>
</html>
