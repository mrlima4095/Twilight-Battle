<!-- templates/spectate.html -->
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twilight Battle - Espectador {{ game_id }}</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        /* Mesmos estilos do game.html, mas com modificações para espectador */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            color: #fff;
        }
        
        .game-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .game-header {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 215, 0, 0.3);
            backdrop-filter: blur(10px);
        }
        
        .game-title {
            font-size: 2em;
            color: #ffd700;
        }
        
        .spectator-badge {
            background: #4a90e2;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        
        .game-info {
            display: flex;
            gap: 30px;
        }
        
        .time-indicator {
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
        }
        
        .time-day {
            background: #ffa500;
            color: #000;
        }
        
        .time-night {
            background: #4a0080;
            color: #fff;
        }
        
        .turn-indicator {
            background: #4CAF50;
            padding: 10px 20px;
            border-radius: 10px;
        }
        
        .spectators-list {
            background: rgba(74, 144, 226, 0.2);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #4a90e2;
        }
        
        .spectators-list h3 {
            color: #4a90e2;
            margin-bottom: 10px;
        }
        
        .spectator-item {
            display: inline-block;
            background: rgba(74, 144, 226, 0.3);
            padding: 5px 10px;
            border-radius: 15px;
            margin: 0 5px 5px 0;
            font-size: 12px;
        }
        
        .opponents-area {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .opponent-card {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            padding: 15px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            backdrop-filter: blur(10px);
        }
        
        .opponent-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.3);
        }
        
        .opponent-name {
            font-weight: bold;
            color: #ffd700;
        }
        
        .opponent-life {
            color: #ff6b6b;
        }
        
        .opponent-stats {
            display: flex;
            gap: 10px;
            margin: 10px 0;
            font-size: 12px;
        }
        
        .stat-badge {
            background: rgba(255, 215, 0, 0.2);
            padding: 3px 8px;
            border-radius: 10px;
            border: 1px solid #ffd700;
        }
        
        .bases-row {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        
        .base-slot {
            width: 50px;
            height: 70px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid #444;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 10px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .base-slot.attack {
            border-color: #ff4444;
        }
        
        .base-slot.defense {
            border-color: #44aaff;
        }
        
        .base-slot.has-card {
            background: rgba(255, 215, 0, 0.2);
            border-color: #ffd700;
        }
        
        .card-tooltip {
            display: none;
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid #ffd700;
            border-radius: 8px;
            padding: 10px;
            width: 200px;
            z-index: 100;
            font-size: 12px;
        }
        
        .base-slot:hover .card-tooltip {
            display: block;
        }
        
        .equipped-items {
            font-size: 8px;
            color: #4a90e2;
            margin-top: 2px;
        }
        
        .graveyard-info {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid #ffd700;
        }
        
        .pile {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #ffd700;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            min-width: 100px;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-block;
            margin-right: 20px;
        }
        
        .pile:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #ffd700;
        }
        
        .exit-btn {
            padding: 10px 20px;
            background: linear-gradient(45deg, #ff4444, #cc0000);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .exit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 68, 68, 0.4);
        }
        
        .waiting-room {
            text-align: center;
            padding: 50px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 20px;
            margin-top: 50px;
        }
        
        .waiting-room h2 {
            color: #ffd700;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <div class="game-title">
                Twilight Battle - Modo Espectador
                <span class="spectator-badge">
                    👁️ Espectador
                </span>
            </div>
            <div class="game-info">
                <div class="time-indicator" id="time-indicator">Carregando...</div>
                <div class="turn-indicator" id="turn-indicator">...</div>
            </div>
            <button class="exit-btn" onclick="exitSpectate()">🚪 Sair</button>
        </div>
        
        <div class="spectators-list" id="spectators-list">
            <h3>👁️ Espectadores</h3>
            <div id="spectators-container">
                <span class="spectator-item">Carregando...</span>
            </div>
        </div>
        
        <div id="opponents-area" class="opponents-area"></div>
        
        <div class="graveyard-info">
            <h3>💀 Informações do Jogo</h3>
            <div class="pile" id="deck-pile" onclick="showGraveyard()">
                <strong>📚 Monte</strong><br>
                <span id="deck-count">0</span> cartas
            </div>
            <div class="pile" id="graveyard-pile" onclick="showGraveyard()">
                <strong>💀 Cemitério</strong><br>
                <span id="graveyard-count">0</span> cartas
            </div>
            <p style="margin-top: 10px; color: #888;">Clique no cemitério para ver as cartas</p>
        </div>
        
        <div class="waiting-room" id="waiting-room" style="display: none;">
            <h2>Aguardando início do jogo...</h2>
            <p>Código da sala: <strong>{{ game_id }}</strong></p>
            <div class="players-list" id="players-list">
                <p>Jogadores na sala:</p>
                <ul id="player-names"></ul>
            </div>
        </div>
    </div>
    
    <script>
        const gameId = '{{ game_id }}';
        const currentUsername = '{{ username }}';
        let gameState = null;
        
        const socket = io({
            reconnection: true,
            reconnectionAttempts: 5,
            reconnectionDelay: 1000
        });
        
        // Conectar como espectador
        socket.on('connect', function() {
            console.log('Conectado como espectador');
            socket.emit('spectate_game', { game_id: gameId });
        });
        
        socket.on('spectate_success', function(data) {
            console.log('Modo espectador ativado:', data);
            requestGameState();
        });
        
        socket.on('spectator_joined', function(data) {
            console.log('Espectador entrou:', data);
            if (data.username === currentUsername) {
                // Próprio espectador entrou
            }
        });
        
        socket.on('game_state', function(data) {
            console.log('Estado do jogo recebido:', data);
            gameState = data;
            updateGameUI();
        });
        
        socket.on('graveyard_list', function(data) {
            console.log('Cemitério recebido:', data);
            showGraveyardModal(data);
        });
        
        socket.on('game_over', function(data) {
            Swal.fire({
                title: '🏆 FIM DE JOGO! 🏆',
                html: `<h2 style="color: #ffd700;">${data.winner_name} VENCEU!</h2>`,
                icon: 'success',
                background: '#1a1a2e',
                color: '#fff',
                confirmButtonColor: '#ffd700',
                confirmButtonText: 'Voltar ao início'
            }).then(() => {
                window.location.href = '/';
            });
        });
        
        function requestGameState() {
            socket.emit('get_game_state', { game_id: gameId });
        }
        
        function updateGameUI() {
            if (!gameState) return;
            
            // Atualizar indicadores
            document.getElementById('time-indicator').textContent = 
                gameState.time_of_day === 'day' ? '☀️ Dia' : '🌙 Noite';
            document.getElementById('time-indicator').className = 
                `time-indicator time-${gameState.time_of_day}`;
            
            if (gameState.current_turn) {
                const currentPlayerData = gameState.players[gameState.current_turn];
                const currentPlayerName = currentPlayerData ? currentPlayerData.name : 'Desconhecido';
                document.getElementById('turn-indicator').textContent = `Vez de: ${currentPlayerName}`;
            }
            
            // Atualizar contadores
            document.getElementById('deck-count').textContent = gameState.deck_count || 0;
            document.getElementById('graveyard-count').textContent = gameState.graveyard_count || 0;
            
            // Atualizar lista de espectadores
            updateSpectatorsList();
            
            // Atualizar área de oponentes
            updateOpponentsArea();
            
            // Mostrar/esconder waiting room
            if (!gameState.started) {
                document.getElementById('waiting-room').style.display = 'block';
                updatePlayersList();
            } else {
                document.getElementById('waiting-room').style.display = 'none';
            }
        }
        
        function updateSpectatorsList() {
            if (!gameState || !gameState.spectators) return;
            
            const container = document.getElementById('spectators-container');
            
            if (gameState.spectators.length === 0) {
                container.innerHTML = '<span class="spectator-item">Nenhum espectador</span>';
                return;
            }
            
            container.innerHTML = '';
            gameState.spectators.forEach(spectator => {
                const span = document.createElement('span');
                span.className = 'spectator-item';
                span.innerHTML = `👁️ ${spectator.name}`;
                container.appendChild(span);
            });
        }
        
        function updatePlayersList() {
            const list = document.getElementById('player-names');
            list.innerHTML = '';
            
            for (const [playerId, playerData] of Object.entries(gameState.players)) {
                const li = document.createElement('li');
                li.textContent = playerData.name;
                list.appendChild(li);
            }
        }
        
        function updateOpponentsArea() {
            const opponentsArea = document.getElementById('opponents-area');
            opponentsArea.innerHTML = '';
            
            if (!gameState || !gameState.started) {
                opponentsArea.innerHTML = '<div class="opponent-card" style="text-align: center; padding: 30px;">⏳ Aguardando início do jogo...</div>';
                return;
            }
            
            for (const [playerUsername, playerData] of Object.entries(gameState.players)) {
                const opponentCard = createOpponentCard(playerUsername, playerData);
                opponentsArea.appendChild(opponentCard);
            }
        }
        
        function createOpponentCard(playerId, playerData) {
            const div = document.createElement('div');
            div.className = 'opponent-card';
            
            div.innerHTML = `
                <div class="opponent-header">
                    <span class="opponent-name">${playerData.name}</span>
                    <span class="opponent-life">❤️ ${playerData.life}</span>
                </div>
                <div class="opponent-stats">
                    <span class="stat-badge">🔮 ${playerData.talisman_count || 0}</span>
                    <span class="stat-badge">🔷 ${playerData.runes || 0}</span>
                </div>
                <div class="bases-section">
                    <small>⚔️ Ataque</small>
                    <div class="bases-row" id="opp-attack-${playerId}"></div>
                </div>
                <div class="bases-section">
                    <small>🛡️ Defesa</small>
                    <div class="bases-row" id="opp-defense-${playerId}"></div>
                </div>
            `;
            
            setTimeout(() => {
                const attackRow = document.getElementById(`opp-attack-${playerId}`);
                const defenseRow = document.getElementById(`opp-defense-${playerId}`);
                
                if (attackRow) {
                    playerData.attack_bases.forEach((card, index) => {
                        const slot = createBaseSlot(card, 'attack', index);
                        attackRow.appendChild(slot);
                    });
                }
                
                if (defenseRow) {
                    playerData.defense_bases.forEach((card, index) => {
                        const slot = createBaseSlot(card, 'defense', index);
                        defenseRow.appendChild(slot);
                    });
                }
            }, 0);
            
            return div;
        }
        
        function createBaseSlot(card, type, index) {
            const slot = document.createElement('div');
            slot.className = `base-slot ${type} ${card ? 'has-card' : ''}`;
            
            if (card) {
                let equippedItems = '';
                if (card.equipped_items && card.equipped_items.length > 0) {
                    equippedItems = `<div class="equipped-items">⚔️🛡️${card.equipped_items.length}</div>`;
                }
                
                slot.innerHTML = `
                    <div style="font-size: 16px;">${getTypeIcon(card.type)}</div>
                    <strong>${card.name.substring(0, 8)}</strong>
                    ${card.life ? `<small>❤️${card.life}</small>` : ''}
                    ${card.attack ? `<small>⚔️${card.attack}</small>` : ''}
                    ${equippedItems}
                    <div class="card-tooltip">
                        <strong>${card.name}</strong><br>
                        Tipo: ${card.type}<br>
                        ${card.description}<br>
                        ${card.life ? `Vida: ${card.life}` : ''}
                        ${card.attack ? ` | Ataque: ${card.attack}` : ''}
                        ${card.blocked ? '<br><span style="color: #ff4444;">🚫 BLOQUEADO</span>' : ''}
                    </div>
                `;
            } else {
                let placeholder = 'Vazio';
                if (type === 'attack') placeholder = '⚔️';
                else if (type === 'defense') placeholder = '🛡️';
                slot.innerHTML = placeholder;
            }
            
            return slot;
        }
        
        function getTypeIcon(type) {
            const icons = {
                'creature': '👤',
                'weapon': '⚔️',
                'armor': '🛡️',
                'talisman': '🔮',
                'spell': '✨',
                'rune': '🔷',
                'oracle': '👁️',
                'ritual': '📿',
                'trap': '⚠️'
            };
            return icons[type] || '📦';
        }
        
        function showGraveyard() {
            if (!gameState || gameState.graveyard_count === 0) {
                Swal.fire({
                    icon: 'info',
                    title: '💀 Cemitério vazio',
                    text: 'Nenhuma carta no cemitério ainda.',
                    background: '#1a1a2e',
                    color: '#fff',
                    confirmButtonColor: '#ffd700'
                });
                return;
            }
            
            Swal.fire({
                title: 'Carregando cemitério...',
                html: 'Aguarde enquanto as cartas são carregadas',
                allowOutsideClick: false,
                didOpen: () => {
                    Swal.showLoading();
                },
                background: '#1a1a2e',
                color: '#fff'
            });
            
            socket.emit('get_graveyard', { game_id: gameId });
        }
        
        function showGraveyardModal(data) {
            let html = `
                <div style="max-height: 500px; overflow-y: auto; padding: 10px;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 15px; background: rgba(255,215,0,0.1); padding: 10px; border-radius: 5px;">
                        <span>Total: <strong style="color: #ffd700;">${data.cards.length}</strong> cartas</span>
                    </div>
            `;
            
            // Agrupar por tipo
            const creatures = data.cards.filter(c => c.type === 'creature');
            const spells = data.cards.filter(c => c.type === 'spell');
            const weapons = data.cards.filter(c => c.type === 'weapon');
            const armors = data.cards.filter(c => c.type === 'armor');
            const runes = data.cards.filter(c => c.type === 'rune' || c.id === 'runa');
            const talismans = data.cards.filter(c => c.type === 'talisman');
            const traps = data.cards.filter(c => c.type === 'trap');
            
            if (creatures.length > 0) {
                html += '<h3 style="color: #ff6b6b; margin: 15px 0 5px;">👤 Criaturas</h3>';
                creatures.forEach(card => {
                    html += createGraveyardCardHTML(card);
                });
            }
            
            if (spells.length > 0) {
                html += '<h3 style="color: #9370db; margin: 15px 0 5px;">✨ Feitiços</h3>';
                spells.forEach(card => {
                    html += createGraveyardCardHTML(card);
                });
            }
            
            if (weapons.length > 0) {
                html += '<h3 style="color: #ffa500; margin: 15px 0 5px;">⚔️ Armas</h3>';
                weapons.forEach(card => {
                    html += createGraveyardCardHTML(card);
                });
            }
            
            if (armors.length > 0) {
                html += '<h3 style="color: #4a90e2; margin: 15px 0 5px;">🛡️ Armaduras</h3>';
                armors.forEach(card => {
                    html += createGraveyardCardHTML(card);
                });
            }
            
            if (runes.length > 0) {
                html += '<h3 style="color: #4CAF50; margin: 15px 0 5px;">🔷 Runas</h3>';
                runes.forEach(card => {
                    html += createGraveyardCardHTML(card);
                });
            }
            
            if (talismans.length > 0) {
                html += '<h3 style="color: #ffd700; margin: 15px 0 5px;">🔮 Talismãs</h3>';
                talismans.forEach(card => {
                    html += createGraveyardCardHTML(card);
                });
            }
            
            if (traps.length > 0) {
                html += '<h3 style="color: #ff00ff; margin: 15px 0 5px;">⚠️ Armadilhas</h3>';
                traps.forEach(card => {
                    html += createGraveyardCardHTML(card);
                });
            }
            
            html += '</div>';
            
            Swal.fire({
                title: '💀 Cemitério',
                html: html,
                showCancelButton: true,
                showConfirmButton: false,
                cancelButtonText: 'Fechar',
                cancelButtonColor: '#ffd700',
                background: '#1a1a2e',
                color: '#fff',
                width: '800px'
            });
        }
        
        function createGraveyardCardHTML(card) {
            let icon = '📦';
            if (card.type === 'creature') icon = '👤';
            else if (card.type === 'spell') icon = '✨';
            else if (card.type === 'weapon') icon = '⚔️';
            else if (card.type === 'armor') icon = '🛡️';
            else if (card.type === 'rune' || card.id === 'runa') icon = '🔷';
            else if (card.type === 'talisman') icon = '🔮';
            else if (card.type === 'trap') icon = '⚠️';
            
            return `
                <div style="padding: 15px; margin: 10px 0; background: rgba(255, 215, 0, 0.1); border: 2px solid #ffd700; border-radius: 10px;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <span style="font-size: 24px;">${icon}</span>
                            <div>
                                <strong style="color: #ffd700; font-size: 16px;">${card.name}</strong>
                                <span style="color: #a8a8a8; margin-left: 10px; font-size: 12px;">${card.type}</span>
                            </div>
                        </div>
                        <div>
                            ${card.life ? `<span style="color: #ff6b6b; margin-right: 10px;">❤️ ${card.life}</span>` : ''}
                            ${card.attack ? `<span style="color: #ffa500; margin-right: 10px;">⚔️ ${card.attack}</span>` : ''}
                            ${card.protection ? `<span style="color: #4a90e2;">🛡️ ${card.protection}</span>` : ''}
                        </div>
                    </div>
                    <div style="color: #ccc; font-size: 12px; margin-top: 5px; margin-left: 30px;">
                        ${card.description || 'Sem descrição'}
                    </div>
                </div>
            `;
        }
        
        function exitSpectate() {
            Swal.fire({
                title: 'Sair do modo espectador?',
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#ff4444',
                cancelButtonColor: '#3085d6',
                confirmButtonText: '🚪 Sair',
                cancelButtonText: 'Continuar assistindo',
                background: '#1a1a2e',
                color: '#fff'
            }).then((result) => {
                if (result.isConfirmed) {
                    window.location.href = '/';
                }
            });
        }
        
        setInterval(requestGameState, 3000);
    </script>
</body>
</html>
