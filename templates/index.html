<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twilight Battle - RPG de Cartas</title>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 800px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        h1 {
            color: #ffd700;
            text-align: center;
            margin-bottom: 10px;
            font-size: 3em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .subtitle {
            color: #a8a8a8;
            text-align: center;
            margin-bottom: 40px;
            font-style: italic;
        }
        
        .join-section {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }
        
        .join-section h2 {
            color: #ffd700;
            margin-bottom: 20px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            color: #fff;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ffd700;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 16px;
        }
        
        input::placeholder {
            color: #888;
        }
        
        select option {
            background: #1a1a2e;
            color: #fff;
        }
        
        button {
            background: linear-gradient(45deg, #ffd700, #ffa500);
            color: #1a1a2e;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            width: 100%;
            margin-bottom: 10px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .create-btn {
            background: linear-gradient(45deg, #4a90e2, #357abd);
            color: white;
        }
        
        .games-list {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }
        
        .games-list h2 {
            color: #ffd700;
            margin-bottom: 15px;
        }
        
        .game-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }
        
        .game-info {
            color: #fff;
            flex: 1;
        }
        
        .game-status {
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 14px;
            margin: 0 10px;
        }
        
        .status-waiting {
            background: #4CAF50;
            color: white;
        }
        
        .status-playing {
            background: #f44336;
            color: white;
        }
        
        .game-actions {
            display: flex;
            gap: 5px;
        }
        
        .join-game-btn {
            padding: 8px 15px;
            background: #ffd700;
            color: #1a1a2e;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .join-game-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 2px 10px rgba(255, 215, 0, 0.4);
        }
        
        .spectate-btn {
            background: #4a90e2 !important;
            color: white !important;
        }
        
        .spectate-btn:hover {
            box-shadow: 0 2px 10px rgba(74, 144, 226, 0.4) !important;
        }
        
        .loading {
            display: none;
            text-align: center;
            color: #fff;
            margin-top: 20px;
        }
        
        .loading.active {
            display: block;
        }
        
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #ffd700;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Tooltip para explicar os botões */
        .tooltip {
            position: relative;
            display: inline-block;
        }

        .tooltip .tooltiptext {
            visibility: hidden;
            width: 120px;
            background-color: rgba(0, 0, 0, 0.8);
            color: #fff;
            text-align: center;
            padding: 5px;
            border-radius: 5px;
            position: absolute;
            z-index: 1;
            bottom: 125%;
            left: 50%;
            margin-left: -60px;
            opacity: 0;
            transition: opacity 0.3s;
            font-size: 12px;
            border: 1px solid #ffd700;
        }

        .tooltip:hover .tooltiptext {
            visibility: visible;
            opacity: 1;
        }

        .game-full-badge {
            background: #888;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Twilight Battle</h1>
        <p class="subtitle">O RPG de cartas onde a noite e o dia decidem seu destino</p>

        <div class="join-section">
            <h2>Entrar em uma partida</h2>
            <div class="input-group">
                <label for="game-id">Código da sala</label>
                <input type="text" id="game-id" placeholder="Ex: ABC123">
            </div>
            <button id="join-game-btn">Entrar na sala</button>
            <button id="create-game-btn" class="create-btn">Criar nova sala</button>
            
            <!-- Informação do usuário logado -->
            <div style="text-align: center; margin-top: 15px; padding: 10px; background: rgba(255,215,0,0.1); border-radius: 8px;">
                <span style="color: #ffd700;">👤 Logado como: <strong id="logged-username">Carregando...</strong></span>
                <button id="logout-btn" style="margin-left: 10px; padding: 5px 10px; background: #ff4444; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 12px;">Sair</button>
            </div>
            
            <!-- LINK PARA REGRAS -->
            <div style="text-align: center; margin-top: 20px;">
                <a href="/rules" style="color: #ffd700; text-decoration: none; font-size: 1.1em;">
                    📜 Ver Regras do Jogo
                </a>
            </div>
        </div>

        <div class="games-list">
            <h2>Salas disponíveis</h2>
            <div id="games-container">
                <div class="game-item">
                    <div class="game-info">Carregando salas...</div>
                </div>
            </div>
            <button id="refresh-games">Atualizar lista</button>
        </div>

        <div style="margin-top: 20px; text-align: center;">
            <button id="story-mode-btn" style="background: linear-gradient(45deg, #9370db, #7b5fb0); color: white; padding: 15px 30px; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: all 0.3s;">
                📖 Modo História (Single Player)
            </button>
            <p style="color: #888; margin-top: 10px; font-size: 14px;">Jogue sozinho, explore o mundo e evolua seu personagem</p>
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Conectando ao servidor...</p>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const gameIdInput = document.getElementById('game-id');
            const joinBtn = document.getElementById('join-game-btn');
            const createBtn = document.getElementById('create-game-btn');
            const refreshBtn = document.getElementById('refresh-games');
            const gamesContainer = document.getElementById('games-container');
            const loading = document.getElementById('loading');
            const loggedUsername = document.getElementById('logged-username');
            const logoutBtn = document.getElementById('logout-btn');
            
            let currentUsername = null;
            
            // Verificar autenticação ao carregar
            fetch('/api/check-auth')
                .then(response => response.json())
                .then(data => {
                    if (!data.authenticated) {
                        location.reload();
                        return;
                    }
                    
                    currentUsername = data.username;
                    loggedUsername.textContent = currentUsername;
                    
                    if (data.current_game && data.game_exists) {
                        window.location.href = `/game/${data.current_game}`;
                    }
                })
                .catch(() => {
                    location.reload();
                });
            
            // Logout
            logoutBtn.addEventListener('click', function() {
                fetch('/api/logout', { method: 'POST' })
                    .then(() => {
                        location.reload();
                    });
            });
            
            // Carregar lista de jogos
            function loadGames() {
                fetch('/api/games')
                    .then(response => response.json())
                    .then(games => {
                        if (games.length === 0) {
                            gamesContainer.innerHTML = '<div class="game-item">Nenhuma sala disponível. Crie uma!</div>';
                            return;
                        }
                        
                        gamesContainer.innerHTML = '';
                        games.forEach(game => {
                            const gameElement = document.createElement('div');
                            gameElement.className = 'game-item';
                            
                            const isFull = game.players >= game.max_players;
                            
                            gameElement.innerHTML = `
                                <div class="game-info">
                                    <strong>Sala: ${game.id}</strong>
                                    ${isFull ? '<span class="game-full-badge">🔴 Lotada</span>' : ''}
                                    <br>
                                    Jogadores: ${game.players}/${game.max_players}
                                </div>
                                <span class="game-status ${game.started ? 'status-playing' : 'status-waiting'}">
                                    ${game.started ? '⚔️ Em andamento' : '⏳ Aguardando'}
                                </span>
                                <div class="game-actions">
                                    ${generateGameButtons(game)}
                                </div>
                            `;
                            
                            gamesContainer.appendChild(gameElement);
                        });
                    });
            }
            
            // Função para gerar os botões baseado no status do jogo
            function generateGameButtons(game) {
                const isFull = game.players >= game.max_players;
                
                // Se o jogo estiver em andamento
                if (game.started) {
                    return `
                        <div class="tooltip">
                            <button class="join-game-btn spectate-btn" onclick="spectateGame('${game.id}')">
                                👁️ Espectar
                            </button>
                            <span class="tooltiptext">Assistir à partida em andamento</span>
                        </div>
                    `;
                }
                
                // Se o jogo estiver aguardando jogadores
                if (!game.started) {
                    // Se estiver lotado, mostrar apenas "Lotada" desabilitado
                    if (isFull) {
                        return `
                            <button class="join-game-btn" disabled style="opacity: 0.5; background: #888;">
                                🔴 Lotada
                            </button>
                        `;
                    }
                    
                    // Sala disponível para entrar
                    return `
                        <div class="tooltip">
                            <button class="join-game-btn" onclick="joinGame('${game.id}')">
                                🎮 Entrar
                            </button>
                            <span class="tooltiptext">Entrar na sala para jogar</span>
                        </div>
                    `;
                }
            }
            
            window.joinGame = function(gameId) {
                if (!currentUsername) {
                    alert('Usuário não autenticado');
                    return;
                }
                
                window.location.href = `/game/${gameId}`;
            };
            
            window.spectateGame = function(gameId) {
                if (!currentUsername) {
                    alert('Usuário não autenticado');
                    return;
                }
                
                window.location.href = `/spectate/${gameId}`;
            };
            
            createBtn.addEventListener('click', function() {
                if (!currentUsername) {
                    alert('Usuário não autenticado');
                    return;
                }
                
                loading.classList.add('active');
                
                fetch('/api/create-game', { method: 'POST' })
                    .then(response => response.json())
                    .then(data => {
                        loading.classList.remove('active');
                        gameIdInput.value = data.game_id;
                        window.location.href = `/game/${data.game_id}`;
                    })
                    .catch(error => {
                        loading.classList.remove('active');
                        alert('Erro ao criar sala');
                    });
                    
            });
            
            refreshBtn.addEventListener('click', loadGames);
            
            joinBtn.addEventListener('click', function() {
                const gameId = gameIdInput.value.trim();
                
                if (!currentUsername) {
                    alert('Usuário não autenticado');
                    return;
                }
                
                if (!gameId) {
                    alert('Digite o código da sala!');
                    return;
                }
                
                // Verificar se a sala existe e está disponível antes de redirecionar
                fetch('/api/games')
                    .then(response => response.json())
                    .then(games => {
                        const game = games.find(g => g.id === gameId);
                        
                        if (!game) {
                            alert('Sala não encontrada!');
                            return;
                        }
                        
                        if (game.started) {
                            // Se já começou, perguntar se quer espectar
                            Swal.fire({
                                title: '⚔️ Jogo em andamento',
                                html: `
                                    <p style="color: #fff;">Esta partida já começou.</p>
                                    <p style="color: #ffd700;">Deseja assistir como espectador?</p>
                                `,
                                icon: 'question',
                                showCancelButton: true,
                                confirmButtonColor: '#4a90e2',
                                cancelButtonColor: '#ff4444',
                                confirmButtonText: '👁️ Sim, assistir',
                                cancelButtonText: 'Cancelar',
                                background: '#1a1a2e',
                                color: '#fff'
                            }).then((result) => {
                                if (result.isConfirmed) {
                                    window.location.href = `/spectate/${gameId}`;
                                }
                            });
                        } else if (game.players >= game.max_players) {
                            alert('Sala lotada!');
                        } else {
                            window.location.href = `/game/${gameId}`;
                        }
                    });
            });

            document.getElementById('story-mode-btn').addEventListener('click', function() {
                if (!currentUsername) {
                    alert('Faça login primeiro!');
                    return;
                }
                window.location.href = '/story';
            });
            
            // Carregar lista inicial
            loadGames();
            
            // Atualizar a cada 5 segundos
            setInterval(loadGames, 5000);
        });
    </script>
</body>
</html>
